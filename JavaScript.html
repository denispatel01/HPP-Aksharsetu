<script>
  (function () {
    var currentUser = null;
    var dashboardCharts = { attendance: null, growth: null, status: null, gender: null, age: null, bdayTrend: null };
    var navCollapsed = false;
    var _globalLoadCount = 0;
    var _loaderTick = null;
    var _loaderProgress = 0;
    var _loaderBoost = 1;
    var _loaderScore = 0;
    var _dashboardRetryArmed = true;
    var _dashboardLoadSeq = 0;
    var _loaderEventSeq = 0;
    var _bootLoadingActive = false;
    var _bootLoaderStartedAt = 0;
    var _dashboardLastData = null;
    var _dashboardLastLoadedAt = 0;
    var DASHBOARD_FRESH_MS = 30 * 60 * 1000;
    var BOOT_CACHE_KEY = 'hpp_bootstrap_cache_v1';
    function _debugLog(label, data) {}
    function _sec(ms) {
      return Number(((Number(ms) || 0) / 1000).toFixed(2));
    }
    function _readBootCache() {
      try {
        var raw = localStorage.getItem(BOOT_CACHE_KEY);
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        if (!parsed || !parsed.user || !parsed.dashboard) return null;
        var total = Number((parsed.dashboard && parsed.dashboard.totalVisible) || 0);
        if (!isFinite(total) || total <= 0) return null;
        var ageMs = Date.now() - Number(parsed.ts || 0);
        if (ageMs > DASHBOARD_FRESH_MS) return null;
        return parsed;
      } catch (e) {
        return null;
      }
    }
    function _writeBootCache(user, dashboard) {
      try {
        var total = Number((dashboard && dashboard.totalVisible) || 0);
        if (!isFinite(total) || total <= 0) return;
        localStorage.setItem(
          BOOT_CACHE_KEY,
          JSON.stringify({
            ts: Date.now(),
            user: user,
            dashboard: dashboard,
          })
        );
      } catch (e) {}
    }
    function _clearBootCache() {
      try { localStorage.removeItem(BOOT_CACHE_KEY); } catch (e) {}
    }
    function _syncBootCacheIfStale(bootCache) {
      try {
        if (!bootCache || !bootCache.dashboard) return;
        var localStamp = String(bootCache.dashboard.cacheStamp || '');
        if (!localStamp) return;
        google.script.run
          .withSuccessHandler(function (res) {
            if (!res || !res.success || !res.data) return;
            var serverStamp = String(res.data.cacheStamp || '');
            if (!serverStamp) return;
            if (serverStamp !== localStamp) {
              _debugLog('dashboard:source', { source: 'stale-boot-refresh' });
              window.loadDashboard({ forceRefresh: true });
            }
          })
          .withFailureHandler(function () {})
          .getDevoteesCacheStamp();
      } catch (e) {}
    }
    function _refreshDashboardInBackground() {
      try {
        var startedAt = Date.now();
        google.script.run
          .withSuccessHandler(function (res) {
            if (!res || !res.success || !res.data) return;
            var d = res.data || {};
            applyDashboardData(d);
            _rememberDashboardData(d);
            _writeBootCache((window.HPP && window.HPP.user) || {}, d);
            _debugLog('dashboard:source', { source: 'background-sync' });
            _debugLog('dashboard:fast:timing', { roundTripMs: Date.now() - startedAt });
          })
          .withFailureHandler(function () {})
          .getDashboardSnapshotFast();
      } catch (e) {}
    }
    function _rememberDashboardData(d) {
      _dashboardLastData = d || null;
      _dashboardLastLoadedAt = Date.now();
    }
    function _isDashboardDataFresh() {
      if (!_dashboardLastData || !_dashboardLastLoadedAt) return false;
      return Date.now() - _dashboardLastLoadedAt <= DASHBOARD_FRESH_MS;
    }
    var THEME_KEY = 'appTheme';
    function $(id) {
      return document.getElementById(id);
    }
    function paintIcons() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
      }
    }
    function updateLayoutMode() {
      var app = $('app');
      if (!app) return;
      var w = window.innerWidth || document.documentElement.clientWidth;
      app.classList.remove('is-mobile', 'is-tablet', 'is-desktop');
      if (w < 768) {
        app.classList.add('is-mobile');
      } else if (w < 1024) {
        app.classList.add('is-tablet');
      } else {
        app.classList.add('is-desktop');
      }
      if (app.classList.contains('is-desktop')) {
        $('sidebar').classList.remove('open');
        app.classList.remove('nav-expanded');
        $('nav-overlay').classList.remove('visible');
        app.classList.toggle('nav-collapsed', navCollapsed);
      } else {
        app.classList.remove('nav-collapsed');
      }
      paintIcons();
    }
    function showToast(message, type) {
      var container = $('toast-container');
      if (!container) return;
      var el = document.createElement('div');
      el.className = 'toast';
      if (type === 'error') el.classList.add('error');
      else if (type === 'success') el.classList.add('success');
      else if (type === 'info') el.classList.add('info');
      var text = document.createElement('div');
      text.textContent = message;
      el.appendChild(text);
      var bar = document.createElement('div');
      bar.className = 'toast-progress';
      el.appendChild(bar);
      container.appendChild(el);
      setTimeout(function () {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, 4200);
    }
    window.showToast = showToast;
    function reportClientError(functionName, message, err, context) {
      try {
        var payload = {
          functionName: functionName || 'client',
          message: String(message || (err && err.message) || 'Client error'),
          stack: err && err.stack ? String(err.stack) : '',
          context: context || {},
          page: (window.HPP && window.HPP.currentPage) || '',
        };
        google.script.run.withSuccessHandler(function () {}).withFailureHandler(function () {}).logClientError(payload);
      } catch (ignore) {}
    }
    window.reportClientError = reportClientError;
    function _loaderEls() {
      return {
        overlay: $('game-loader'),
        text: $('game-loader-text'),
        bar: $('game-loader-bar'),
        pct: $('game-loader-pct'),
        score: $('game-loader-score'),
      };
    }
    function _drawLoader() {
      var els = _loaderEls();
      if (!els.bar) return;
      var p = Math.max(0, Math.min(100, _loaderProgress));
      els.bar.style.width = p + '%';
      if (els.pct) els.pct.textContent = Math.round(p) + '%';
      if (els.score) els.score.textContent = 'Bhajan x' + _loaderScore;
    }
    function _startLoader(text) {
      var els = _loaderEls();
      if (!els.overlay) return;
      if (els.text) els.text.textContent = 'હે હરિ ! બસ એક, તું રાજી થા';
      els.overlay.classList.add('visible');
      els.overlay.setAttribute('aria-hidden', 'false');
      if (_loaderTick) clearInterval(_loaderTick);
      _loaderProgress = Math.max(_loaderProgress, 6);
      _loaderBoost = 1;
      _drawLoader();
      _loaderTick = setInterval(function () {
        if (_loaderProgress >= 94) return;
        var step = 0.7 * _loaderBoost + Math.random() * 0.8;
        _loaderProgress += step;
        _loaderBoost = Math.max(1, _loaderBoost * 0.95);
        _drawLoader();
      }, 120);
    }
    function _finishLoader() {
      var els = _loaderEls();
      if (_loaderTick) {
        clearInterval(_loaderTick);
        _loaderTick = null;
      }
      _loaderProgress = 100;
      _drawLoader();
      setTimeout(function () {
        if (els.overlay) {
          els.overlay.classList.remove('visible');
          els.overlay.setAttribute('aria-hidden', 'true');
        }
        _loaderProgress = 0;
        _loaderBoost = 1;
        _loaderScore = 0;
        _drawLoader();
      }, 220);
    }
    window.loaderBoost = function () {
      if (_globalLoadCount <= 0) return;
      _loaderScore += 1;
      _loaderBoost = Math.min(4, _loaderBoost + 0.65);
      _loaderProgress = Math.min(98, _loaderProgress + 2.2);
      var els = _loaderEls();
      if (els.text) {
        var jap = Math.min(6, _loaderScore + 2);
        var chant = [];
        for (var i = 0; i < jap; i++) chant.push('Swaminarayan');
        els.text.textContent = chant.join(' ');
      }
      _drawLoader();
    };
    function setGlobalLoading(on, text, source) {
      var src = source || 'unknown';
      if (on) {
        _globalLoadCount++;
        _loaderEventSeq++;
        _debugLog('loader:on', {
          eventId: _loaderEventSeq,
          source: src,
          text: text || '',
          count: _globalLoadCount,
        });
        _startLoader(text);
      } else {
        _globalLoadCount = Math.max(0, _globalLoadCount - 1);
        _loaderEventSeq++;
        _debugLog('loader:off', {
          eventId: _loaderEventSeq,
          source: src,
          text: text || '',
          count: _globalLoadCount,
        });
        if (_globalLoadCount === 0) {
          _debugLog('loader:finish', { source: src });
          _finishLoader();
        }
      }
    }
    window.setGlobalLoading = setGlobalLoading;
    function setTopProgress(v) {
      _loaderProgress = Math.max(0, Math.min(100, Number(v) || 0));
      _drawLoader();
    }
    function startTopProgress() { setGlobalLoading(true, 'Loading...', 'startTopProgress'); }
    function doneTopProgress() { setGlobalLoading(false, '', 'doneTopProgress'); }
    window.startTopProgress = startTopProgress;
    window.doneTopProgress = doneTopProgress;
    window.setTopProgress = setTopProgress;
    function applyTheme(theme) {
      var t = theme === 'light' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem(THEME_KEY, t); } catch (e) {}
      syncThemeToggle();
    }
    function currentTheme() {
      var t = document.documentElement.getAttribute('data-theme');
      return t === 'light' ? 'light' : 'dark';
    }
    function syncThemeToggle() {
      var btn = $('themeToggle');
      if (!btn) return;
      var isLight = currentTheme() === 'light';
      var icon = btn.querySelector('.toggle-icon');
      var lbl = btn.querySelector('.toggle-label');
      if (icon) icon.textContent = isLight ? '☀️' : '🌙';
      if (lbl) lbl.textContent = isLight ? 'Light' : 'Dark';
    }
    window.toggleTheme = function () {
      applyTheme(currentTheme() === 'light' ? 'dark' : 'light');
    };
    function showSweetAlert(title, text) {
      var overlay = $('sweet-alert-overlay');
      if (!overlay) return;
      $('sweet-alert-title').textContent = title || 'Notice';
      $('sweet-alert-text').textContent = text || '';
      overlay.classList.add('visible');
      overlay.setAttribute('aria-hidden', 'false');
      paintIcons();
    }
    window.closeSweetAlert = function () {
      var overlay = $('sweet-alert-overlay');
      if (!overlay) return;
      overlay.classList.remove('visible');
      overlay.setAttribute('aria-hidden', 'true');
    };
    window.closeModal = function () {
      var b = $('modal-backdrop');
      if (b) b.classList.remove('visible');
    };
    function formatHeaderUserLine(user) {
      var name = (user && user.name) || '—';
      var role = String((user && user.role) || '').trim().toLowerCase();
      var pretty = 'User';
      if (role === 'admin') {
        pretty = (user && (user.isSuperAdmin || user.superAdmin)) ? 'Super Admin' : 'Admin';
      } else if (role === 'sub-leader') {
        pretty = 'Sub-leader';
      } else if (role) {
        pretty = role.charAt(0).toUpperCase() + role.slice(1);
      }
      return name + ' · ' + pretty;
    }
    function setShellUser(user) {
      var name = (user && user.name) || '—';
      var email = (user && user.email) || '—';
      var initials = name && name !== '—' ? name.trim().charAt(0).toUpperCase() : 'H';
      $('sidebar-user-name').textContent = name;
      $('sidebar-user-email').textContent = email;
      $('header-avatar').textContent = initials;
      var headerLine = $('header-user-line');
      if (headerLine) headerLine.textContent = formatHeaderUserLine(user);
    }
    function closeHeaderAccountMenu() {
      var menu = $('header-account-menu');
      if (!menu) return;
      menu.classList.remove('open');
      menu.setAttribute('aria-hidden', 'true');
    }
    function toggleHeaderAccountMenu() {
      var menu = $('header-account-menu');
      if (!menu) return;
      var open = !menu.classList.contains('open');
      if (open) {
        menu.classList.add('open');
        menu.setAttribute('aria-hidden', 'false');
      } else {
        closeHeaderAccountMenu();
      }
      paintIcons();
    }
    function applyHeaderSearch(query) {
      var q = String(query || '').trim();
      if (!q) {
        if (window.HPP && window.HPP.currentPage === 'devotees') {
          var ds0 = $('dev-search');
          if (ds0) ds0.value = '';
          if (typeof window.applyFilters === 'function') window.applyFilters();
        }
        return;
      }
      if (window.HPP && window.HPP.currentPage !== 'devotees') {
        navTo('devotees');
      }
      var ds = $('dev-search');
      if (!ds) return;
      ds.value = q;
      if (typeof window.applyFilters === 'function') window.applyFilters();
      else if (typeof window.loadDevotees === 'function') window.loadDevotees();
    }
    function showLogin() {
      $('login-page').style.display = '';
      $('app').style.display = 'none';
    }
    function showApp(user, opts) {
      opts = opts || {};
      currentUser = user;
      window.HPP = window.HPP || {};
      window.HPP.user = user;
      $('login-page').style.display = 'none';
      $('app').style.display = '';
      updateLayoutMode();
      setShellUser(user);
      if (opts.skipInitialDashboardLoad) {
        window.HPP.currentPage = 'dashboard';
        var pages = document.querySelectorAll('.page');
        for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
        var target = $('page-dashboard');
        if (target) target.classList.add('active');
        var items = document.querySelectorAll('.nav-item');
        for (var j = 0; j < items.length; j++) {
          items[j].classList.toggle('active', items[j].getAttribute('data-page') === 'dashboard');
        }
        var docks = document.querySelectorAll('.dock-item');
        for (var k = 0; k < docks.length; k++) {
          docks[k].classList.toggle('active', docks[k].getAttribute('data-page') === 'dashboard');
        }
        var ht = $('header-page-title');
        var hs = $('header-page-sub');
        if (ht) ht.textContent = 'Dashboard';
        if (hs) hs.textContent = 'Overview';
      } else {
        navTo('dashboard');
      }
      paintIcons();
    }
    window.openSidebar = function () {
      var app = $('app');
      $('sidebar').classList.add('open');
      if (app && app.classList.contains('is-tablet')) {
        app.classList.add('nav-expanded');
      }
      $('nav-overlay').classList.add('visible');
    };
    window.closeSidebar = function () {
      var app = $('app');
      $('sidebar').classList.remove('open');
      if (app) {
        app.classList.remove('nav-expanded');
      }
      $('nav-overlay').classList.remove('visible');
    };
    window.toggleSidebar = function () {
      var app = $('app');
      if (!app) return;
      if (app.classList.contains('is-mobile')) {
        if ($('sidebar').classList.contains('open')) window.closeSidebar();
        else window.openSidebar();
        return;
      }
      if (app.classList.contains('is-tablet')) {
        if (app.classList.contains('nav-expanded')) window.closeSidebar();
        else window.openSidebar();
        return;
      }
      navCollapsed = !navCollapsed;
      app.classList.toggle('nav-collapsed', navCollapsed);
    };
    function destroyDashboardCharts() {
      var keys = Object.keys(dashboardCharts);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        if (dashboardCharts[k]) {
          dashboardCharts[k].destroy();
          dashboardCharts[k] = null;
        }
      }
    }
    function chartDefaults() {
      if (typeof Chart === 'undefined') return;
      Chart.defaults.color = '#9a9590';
      Chart.defaults.borderColor = '#252525';
      Chart.defaults.font.family = "'DM Sans', sans-serif";
    }
    function renderDashboardCharts(data) {
      if (typeof Chart === 'undefined') return;
      chartDefaults();
      var gold = '#c9a96e';
      var goldSoft = 'rgba(201, 169, 110, 0.12)';
      var weeks = ['W1', 'W2', 'W3', 'W4'];
      var att = (data && data.attendanceLast4Weeks) || [0, 0, 0, 0];
      var gLabels = (data && data.devoteeGrowthMonths) || ['M1', 'M2', 'M3', 'M4', 'M5', 'M6'];
      var gCounts = (data && data.devoteeGrowthCounts) || [0, 0, 0, 0, 0, 0];
      var statusLabels = (data && data.statusLabels) || ['Active', 'Inactive', 'Relocated', 'Deceased'];
      var statusCounts = (data && data.statusCounts) || [0, 0, 0, 0];
      var genderLabels = (data && data.genderLabels) || ['Male', 'Female', 'Other'];
      var genderCounts = (data && data.genderCounts) || [0, 0, 0];
      var ageLabels = (data && data.ageBandLabels) || ['Kids', 'Youth', 'Adult', 'Senior', 'Unknown'];
      var ageCounts = (data && data.ageBandCounts) || [0, 0, 0, 0, 0];
      var bTrendLabels = (data && data.birthdayTrendLabels) || ['W1', 'W2', 'W3', 'W4', 'W5'];
      var bTrendCounts = (data && data.birthdayTrendCounts) || [0, 0, 0, 0, 0];
      var canvasAtt = $('dash-chart-attendance');
      var canvasGrowth = $('dash-chart-growth');
      var canvasStatus = $('dash-chart-status');
      var canvasGender = $('dash-chart-gender');
      var canvasAge = $('dash-chart-age');
      var canvasBTrend = $('dash-chart-bday-trend');
      if (!canvasAtt || !canvasGrowth) return;
      destroyDashboardCharts();
      dashboardCharts.attendance = new Chart(canvasAtt.getContext('2d'), {
        type: 'bar',
        data: {
          labels: weeks,
          datasets: [
            {
              label: 'Attendance %',
              data: att,
              backgroundColor: goldSoft,
              borderColor: gold,
              borderWidth: 1,
              borderRadius: 6,
              maxBarThickness: 44,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'top', labels: { boxWidth: 10, color: '#9a9590' } },
          },
          scales: {
            y: {
              min: 0,
              max: 100,
              ticks: { color: '#5c5955', font: { size: 11 } },
              grid: { color: 'rgba(37,37,37,0.9)' },
            },
            x: {
              ticks: { color: '#5c5955', font: { size: 11 } },
              grid: { display: false },
            },
          },
        },
      });
      dashboardCharts.growth = new Chart(canvasGrowth.getContext('2d'), {
        type: 'line',
        data: {
          labels: gLabels,
          datasets: [
            {
              label: 'Devotees',
              data: gCounts,
              borderColor: gold,
              backgroundColor: 'rgba(201, 169, 110, 0.06)',
              tension: 0.35,
              fill: true,
              pointRadius: 4,
              pointBackgroundColor: gold,
              pointBorderColor: '#111',
              pointBorderWidth: 1,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'top', labels: { boxWidth: 10, color: '#9a9590' } },
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { color: '#5c5955', font: { size: 11 } },
              grid: { color: 'rgba(37,37,37,0.9)' },
            },
            x: {
              ticks: { color: '#5c5955', font: { size: 11 } },
              grid: { display: false },
            },
          },
        },
      });
      if (canvasStatus) {
        dashboardCharts.status = new Chart(canvasStatus.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: statusLabels,
            datasets: [{ data: statusCounts, backgroundColor: ['#4e9e7a', '#b8860b', '#4d7aff', '#c46a6a'] }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
        });
      }
      if (canvasGender) {
        dashboardCharts.gender = new Chart(canvasGender.getContext('2d'), {
          type: 'pie',
          data: {
            labels: genderLabels,
            datasets: [{ data: genderCounts, backgroundColor: ['#5fa8ff', '#ff8ab2', '#f6c26b'] }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
        });
      }
      if (canvasAge) {
        dashboardCharts.age = new Chart(canvasAge.getContext('2d'), {
          type: 'bar',
          data: {
            labels: ageLabels,
            datasets: [{ label: 'Count', data: ageCounts, backgroundColor: 'rgba(201,169,110,0.35)', borderColor: gold }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
        });
      }
      if (canvasBTrend) {
        dashboardCharts.bdayTrend = new Chart(canvasBTrend.getContext('2d'), {
          type: 'line',
          data: {
            labels: bTrendLabels,
            datasets: [{ label: 'Birthdays', data: bTrendCounts, borderColor: '#ff9a4d', backgroundColor: 'rgba(255,154,77,0.12)', fill: true, tension: 0.35 }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
        });
      }
    }
    function setKpiLoading() {
      var ids = [
        'dash-kpi-total',
        'dash-kpi-active',
        'dash-kpi-families',
        'dash-kpi-followups',
        'dash-kpi-birthdays',
        'dash-kpi-birthdays-30',
        'dash-kpi-sabha',
        'dash-kpi-male',
        'dash-kpi-female',
        'dash-kpi-other',
        'dash-kpi-donation',
        'dash-kpi-wa',
        'dash-kpi-karyakarta',
      ];
      for (var i = 0; i < ids.length; i++) {
        var el = $(ids[i]);
        if (!el) continue;
        el.textContent = '0';
      }
    }
    function applyDashboardData(d) {
      function setVal(id, v) {
        var el = $(id);
        if (!el) return;
        el.textContent = String(v == null ? '0' : v);
      }
      var activeEl = $('dash-kpi-active');
      var sabhaEl = $('dash-kpi-sabha');
      var fuEl = $('dash-kpi-followups');
      var bdayEl = $('dash-kpi-birthdays');
      var nActive = Number((d && d.activeDevotees) || 0);
      var nFu = Number((d && d.pendingFollowups) || 0);
      var bdays = (d && d.todayBirthdays) || [];
      var nBday = bdays.length;
      var sp = d && d.weekSabhaPercent;
      var sabhaText =
        sp === null || sp === undefined || sp === '' ? '—' : String(sp) + '%';
      if (activeEl) {
        activeEl.textContent = '';
        activeEl.appendChild(document.createTextNode(String(nActive)));
      }
      if (fuEl) {
        fuEl.textContent = '';
        fuEl.appendChild(document.createTextNode(String(nFu)));
      }
      if (bdayEl) {
        bdayEl.textContent = '';
        bdayEl.appendChild(document.createTextNode(String(nBday)));
      }
      if (sabhaEl) {
        sabhaEl.textContent = '';
        sabhaEl.appendChild(document.createTextNode(sabhaText));
      }
      setVal('dash-kpi-total', Number((d && d.totalVisible) || 0));
      setVal('dash-kpi-families', Number((d && d.familiesCount) || 0));
      setVal('dash-kpi-birthdays-30', (d && d.upcomingBirthdays30 && d.upcomingBirthdays30.length) || 0);
      setVal('dash-kpi-male', Number((d && d.maleCount) || 0));
      setVal('dash-kpi-female', Number((d && d.femaleCount) || 0));
      setVal('dash-kpi-other', Number((d && d.otherCount) || 0));
      setVal('dash-kpi-donation', Number((d && d.donationEnabledCount) || 0));
      setVal('dash-kpi-wa', Number((d && d.whatsAppOptedInCount) || 0));
